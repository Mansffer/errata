version: '3.8'

services:
  errata:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: errata
    ports:
      - "7739:7739"
    environment:
      - PORT=7739
      - HOST=0.0.0.0
      - DATA_DIR=/app/data
      - PLUGIN_DIR=/app/plugins
      - NODE_ENV=production
      # Uncomment to allow external plugins to override static ones
      # - PLUGIN_EXTERNAL_OVERRIDE=1
    volumes:
      - errata-data:/app/data
      - errata-plugins:/app/plugins
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.errata-service.loadbalancer.server.port=7739"
      - "traefik.http.routers.errata-router.middlewares=errata-auth"
      - "traefik.http.middlewares.errata-auth.basicauth.users=${BASIC_AUTH_USERS}"
    restart: unless-stopped

volumes:
  errata-data:
  errata-plugins:
